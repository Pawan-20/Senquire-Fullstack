services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      IMAGE_SOURCE_FOLDER: /app/data/images
      THUMBNAIL_FOLDER: /app/data/thumbnails
      MODEL_DIR: /app/models/defect-classifier-resnet18
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
    command: >
      watchmedo auto-restart --directory=./app --pattern=*.py --recursive --
      celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4}
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      IMAGE_SOURCE_FOLDER: /app/data/images
      THUMBNAIL_FOLDER: /app/data/thumbnails
      MODEL_DIR: /app/models/defect-classifier-resnet18
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
